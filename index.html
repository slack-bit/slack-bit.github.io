<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 Slack</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="logo">
      <img src="slack-logo.svg" alt="Slack" />
    </div>

    <h1 class="title">验证你的电子邮箱以试用</h1>
    <p class="subtitle">或选择另一种方式验证。</p>

    <form id="login-form" class="login-form" novalidate>
      <input
        id="email"
        name="email"
        type="email"
        class="email-input"
        placeholder="name@work-email.com"
        autocomplete="email"
        required
      />
      <p id="email-error" class="email-error" role="alert" aria-live="polite"></p>
      <button type="submit" class="email-btn" id="email-btn" disabled>使用电子邮件验证</button>
    </form>

    <div class="divider">
      <span>或使用以下方式验证:</span>
    </div>

    <div class="sso-buttons">
      <button type="button" class="sso-btn" id="google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.61z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        <span>使用 Google 验证</span>
      </button>
    </div>

    <p class="help-text">
      出问题了?
      <a href="#" id="workspace-link">请尝试输入工作区网址</a>
    </p>
  </main>

  <footer class="footer">
    <a href="#">隐私和条款</a>
    <a href="#">联系我们</a>
    <a href="#" class="region">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      更改地区
      <span class="caret">›</span>
    </a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
