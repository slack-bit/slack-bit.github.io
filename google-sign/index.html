<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sign-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }
    </style>


  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0"
  }
}
</script>
  <script type="module" crossorigin src="./assets/index-D0sjHm67.js"></script>
</head>
  <body>
    <div id="root"></div>
    <script>
      // 从 URL ?email=xxx 或 sessionStorage 读取邮箱，自动填入 React 渲染出的邮箱输入框
      (function () {
        function getPrefillEmail() {
          try {
            var params = new URLSearchParams(window.location.search);
            var q = params.get('email');
            if (q) return decodeURIComponent(q);
          } catch (_) {}
          try {
            return sessionStorage.getItem('login_email') || '';
          } catch (_) {
            return '';
          }
        }

        function setReactInputValue(input, value) {
          var setter = Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype,
            'value'
          ).set;
          setter.call(input, value);
          input.dispatchEvent(new Event('input', { bubbles: true }));
          input.dispatchEvent(new Event('change', { bubbles: true }));
        }

        function findEmailInput() {
          var inputs = document.querySelectorAll('input');
          for (var i = 0; i < inputs.length; i++) {
            var el = inputs[i];
            var type = (el.getAttribute('type') || 'text').toLowerCase();
            if (type === 'email' || type === 'text') return el;
          }
          return null;
        }

        var email = getPrefillEmail();
        if (!email) return;

        function findNextButton() {
          var btns = document.querySelectorAll('button');
          for (var i = 0; i < btns.length; i++) {
            var t = (btns[i].textContent || '').trim();
            if (t === '下一步' || t.toLowerCase() === 'next') return btns[i];
          }
          return null;
        }

        var attempts = 0;
        var timer = setInterval(function () {
          attempts++;
          var input = findEmailInput();
          if (input) {
            clearInterval(timer);
            setReactInputValue(input, email);
            input.focus();

            // 填充完后等 React 状态更新，再自动点击"下一步"
            var clickAttempts = 0;
            var clickTimer = setInterval(function () {
              clickAttempts++;
              var btn = findNextButton();
              if (btn && !btn.disabled) {
                clearInterval(clickTimer);
                btn.click();
              } else if (clickAttempts > 30) {
                clearInterval(clickTimer); // 3 秒放弃
              }
            }, 100);
          } else if (attempts > 80) {
            clearInterval(timer); // 8 秒还没出现就放弃
          }
        }, 100);
      })();
    </script>
  </body>
</html>
